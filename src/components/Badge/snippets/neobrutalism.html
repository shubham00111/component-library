<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neobrutalism Badge</title>
  <link rel="stylesheet" href="neobrutalism.css" />
</head>
<body style="padding:32px;font-family:system-ui,sans-serif;display:flex;gap:8px;flex-wrap:wrap;">
  <span class="nb-badge nb-badge--default nb-badge--md">Default</span>
  <span class="nb-badge nb-badge--success nb-badge--md">Success</span>
  <span class="nb-badge nb-badge--warning nb-badge--md">Warning</span>
  <span class="nb-badge nb-badge--destructive nb-badge--md">Destructive</span>
  <span class="nb-badge nb-badge--outline nb-badge--md">Outline</span>
</body>
</html>
