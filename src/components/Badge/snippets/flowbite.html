<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flowbite Badge</title>
  <link rel="stylesheet" href="flowbite.css" />
</head>
<body style="padding:32px;font-family:system-ui,sans-serif;display:flex;gap:8px;flex-wrap:wrap;">
  <span class="fb-badge fb-badge--default fb-badge--md">Default</span>
  <span class="fb-badge fb-badge--success fb-badge--md">Success</span>
  <span class="fb-badge fb-badge--warning fb-badge--md">Warning</span>
  <span class="fb-badge fb-badge--destructive fb-badge--md">Destructive</span>
  <span class="fb-badge fb-badge--outline fb-badge--md">Outline</span>
</body>
</html>
